server:
  port: 8082

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/kitchen}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
    show-sql: true
    hibernate:
      ddl-auto: update
    database: mysql
  cache:
    type: redis
    redis:
      cache-null-values: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      retries: 3
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        delivery.timeout.ms: 10000
        request.timeout.ms: 5000
        enable.idempotence: true
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:kitchen-monolith}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.example.kitchen.*"
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:username}
    password: ${MAIL_PASSWORD:password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

value:
  secret-key: ${JWT_SECRET:11031f8e3039d76325b391fcc32a02baa8eece937152c2072efb093653d3f4d2ab06c9de}
  expire:
    time: 86400000

kitchen:
  cache:
    menu-ttl: 5m
    menu-search-ttl: 2m
    order-ttl: 3m
    order-list-ttl: 1m
  kafka:
    topics:
      order-lifecycle: kitchen.order.lifecycle.v1
      notification: kitchen.notification.events.v1
      dead-letter: kitchen.notification.events.v1.dlq
  rate-limit:
    auth-per-minute: 5
    order-per-minute: 10
    cart-per-minute: 30
    search-per-minute: 60
